<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .calculator {
      width: 320px;
      background: #1e1e2f;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .display {
      background: #0d0d1a;
      border-radius: 12px;
      padding: 20px 16px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .expression {
      color: #6b7280;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .result {
      color: #f0f0f0;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: #2d2d44;
      color: #f0f0f0;
    }

    .btn-number:hover {
      background: #3d3d5c;
    }

    .btn-operator {
      background: #e94560;
      color: #fff;
    }

    .btn-operator:hover {
      background: #ff6b81;
    }

    .btn-operator.active {
      background: #fff;
      color: #e94560;
    }

    .btn-function {
      background: #3d3d5c;
      color: #a0a0b0;
    }

    .btn-function:hover {
      background: #4d4d6c;
    }

    .btn-equals {
      background: #00b894;
      color: #fff;
      grid-column: span 2;
    }

    .btn-equals:hover {
      background: #00d9a5;
    }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-function" data-action="clear">C</button>
      <button class="btn-function" data-action="toggle-sign">±</button>
      <button class="btn-function" data-action="percent">%</button>
      <button class="btn-operator" data-action="operator" data-value="/">÷</button>

      <button class="btn-number" data-action="digit" data-value="7">7</button>
      <button class="btn-number" data-action="digit" data-value="8">8</button>
      <button class="btn-number" data-action="digit" data-value="9">9</button>
      <button class="btn-operator" data-action="operator" data-value="*">×</button>

      <button class="btn-number" data-action="digit" data-value="4">4</button>
      <button class="btn-number" data-action="digit" data-value="5">5</button>
      <button class="btn-number" data-action="digit" data-value="6">6</button>
      <button class="btn-operator" data-action="operator" data-value="-">−</button>

      <button class="btn-number" data-action="digit" data-value="1">1</button>
      <button class="btn-number" data-action="digit" data-value="2">2</button>
      <button class="btn-number" data-action="digit" data-value="3">3</button>
      <button class="btn-operator" data-action="operator" data-value="+">+</button>

      <button class="btn-number btn-zero" data-action="digit" data-value="0">0</button>
      <button class="btn-number" data-action="decimal">,</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");
    const operatorButtons = document.querySelectorAll(".btn-operator");

    let currentValue = "0";
    let previousValue = "";
    let operator = null;
    let shouldResetDisplay = false;

    function updateDisplay() {
      resultEl.textContent = formatNumber(currentValue);
      expressionEl.textContent = previousValue && operator
        ? `${formatNumber(previousValue)} ${getOperatorSymbol(operator)}`
        : "";
    }

    function formatNumber(value) {
      if (value === "" || value === "-") return value || "0";
      const num = parseFloat(value);
      if (isNaN(num)) return "0";
      const str = num.toString();
      if (str.length > 12) {
        return num.toExponential(6);
      }
      return str.replace(".", ",");
    }

    function getOperatorSymbol(op) {
      return { "+": "+", "-": "−", "*": "×", "/": "÷" }[op] || op;
    }

    function inputDigit(digit) {
      if (shouldResetDisplay) {
        currentValue = digit;
        shouldResetDisplay = false;
      } else {
        currentValue = currentValue === "0" ? digit : currentValue + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (shouldResetDisplay) {
        currentValue = "0.";
        shouldResetDisplay = false;
      } else if (!currentValue.includes(".")) {
        currentValue += ".";
      }
      updateDisplay();
    }

    function clear() {
      currentValue = "0";
      previousValue = "";
      operator = null;
      shouldResetDisplay = false;
      operatorButtons.forEach((btn) => btn.classList.remove("active"));
      updateDisplay();
    }

    function toggleSign() {
      if (currentValue === "0") return;
      currentValue = currentValue.startsWith("-")
        ? currentValue.slice(1)
        : "-" + currentValue;
      updateDisplay();
    }

    function percent() {
      const num = parseFloat(currentValue);
      if (!isNaN(num)) {
        currentValue = (num / 100).toString();
        updateDisplay();
      }
    }

    function setOperator(op) {
      const current = parseFloat(currentValue);

      if (operator !== null && !shouldResetDisplay) {
        calculate();
      } else {
        previousValue = currentValue;
      }

      operator = op;
      shouldResetDisplay = true;

      operatorButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.value === op);
      });

      updateDisplay();
    }

    function calculate() {
      if (operator === null || previousValue === "") return;

      const prev = parseFloat(previousValue);
      const current = parseFloat(currentValue);
      let result;

      switch (operator) {
        case "+": result = prev + current; break;
        case "-": result = prev - current; break;
        case "*": result = prev * current; break;
        case "/":
          if (current === 0) {
            currentValue = "Ошибка";
            previousValue = "";
            operator = null;
            shouldResetDisplay = true;
            operatorButtons.forEach((btn) => btn.classList.remove("active"));
            updateDisplay();
            return;
          }
          result = prev / current;
          break;
      }

      expressionEl.textContent = `${formatNumber(previousValue)} ${getOperatorSymbol(operator)} ${formatNumber(currentValue)} =`;
      currentValue = result.toString();
      previousValue = "";
      operator = null;
      shouldResetDisplay = true;
      operatorButtons.forEach((btn) => btn.classList.remove("active"));
      resultEl.textContent = formatNumber(currentValue);
    }

    document.querySelector(".buttons").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const action = btn.dataset.action;

      switch (action) {
        case "digit": inputDigit(btn.dataset.value); break;
        case "decimal": inputDecimal(); break;
        case "clear": clear(); break;
        case "toggle-sign": toggleSign(); break;
        case "percent": percent(); break;
        case "operator": setOperator(btn.dataset.value); break;
        case "equals": calculate(); break;
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key >= "0" && e.key <= "9") inputDigit(e.key);
      else if (e.key === "." || e.key === ",") inputDecimal();
      else if (e.key === "+") setOperator("+");
      else if (e.key === "-") setOperator("-");
      else if (e.key === "*") setOperator("*");
      else if (e.key === "/") { e.preventDefault(); setOperator("/"); }
      else if (e.key === "Enter" || e.key === "=") calculate();
      else if (e.key === "Escape") clear();
      else if (e.key === "Backspace") {
        if (currentValue.length > 1) {
          currentValue = currentValue.slice(0, -1);
        } else {
          currentValue = "0";
        }
        updateDisplay();
      }
    });
  </script>
</body>
</html>
